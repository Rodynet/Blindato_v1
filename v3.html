<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DptoLibre - Pasaporte Digital Autónomo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-blue: #0055DD;
            --brand-dark: #0D1B4B;
            --brand-cyan: #00D1FF;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #E8EAF0;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .mobile-shell {
            width: 100%;
            height: 100vh;
            max-width: 414px;
            margin: 0 auto;
            background: #F0F2F6;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .passport-gradient {
            background: linear-gradient(135deg, #0D1B4B 0%, #0055DD 100%);
        }

        .face-guide {
            width: 200px;
            height: 260px;
            border: 2px solid var(--brand-cyan);
            border-radius: 100px;
            position: relative;
        }

        .face-guide::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 2px border-dashed white;
            border-radius: 105px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .blur-locked {
            filter: grayscale(1) opacity(0.4);
            pointer-events: none;
        }
        
        .logo-font {
            letter-spacing: -0.05em;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { window.lucide && window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Logo = ({ light = false, size = "md" }) => (
            <div className={`flex flex-col items-center ${light ? 'text-white' : 'text-[#0D1B4B]'}`}>
                <svg width={size === "lg" ? "56" : "32"} viewBox="0 0 32 40" fill="none">
                    <path d="M16 0L32 6.4V33.6L16 40V6.4L16 0Z" fill={light ? "white" : "#0055DD"} fillOpacity="0.3"/>
                    <path d="M0 6.4L16 0V33.6L0 40V6.4Z" fill={light ? "white" : "#0055DD"}/>
                </svg>
                <div className={`logo-font ${size === "lg" ? 'text-2xl mt-2' : 'text-lg mt-1'}`}>
                    dpto <span className="font-light">libre</span>
                </div>
            </div>
        );

        function DptoLibreApp() {
            const [view, setView] = useState('splash'); // splash, validation, success, home
            const [valStep, setValStep] = useState(1); // 1:DNI-F, 2:DNI-D, 3:FACE, 4:RECIBOS, 5:HISTORIAL
            const [isScanning, setIsScanning] = useState(false);

            const handleNextVal = () => {
                setIsScanning(true);
                setTimeout(() => {
                    setIsScanning(false);
                    if (valStep < 5) setValStep(valStep + 1);
                    else setView('success');
                }, 1500);
            };

            // --- PANTALLA INICIAL ---
            const Splash = () => (
                <div className="mobile-shell passport-gradient flex flex-col justify-center items-center p-10 text-center animate-in">
                    <Logo light size="lg" />
                    <h1 className="text-white text-2xl font-black mt-8 uppercase tracking-tighter">Pasaporte de Alquiler</h1>
                    <p className="text-white/60 text-sm mt-4 leading-relaxed">Validamos tu perfil para que encuentres tu hogar sin burocracia.</p>
                    <div className="w-full mt-12 space-y-4">
                        <button onClick={() => setView('validation')} className="w-full bg-[#00D1FF] text-[#0D1B4B] py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Crear mi Pasaporte</button>
                        <button onClick={() => setView('home')} className="w-full bg-white/10 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest border border-white/20">Ya tengo cuenta</button>
                    </div>
                </div>
            );

            // --- FLUJO DE VALIDACIÓN (MAGO) ---
            const ValidationWizard = () => (
                <div className="mobile-shell bg-white flex flex-col animate-in">
                    <header className="p-8 pb-4">
                        <div className="flex justify-between items-center mb-6">
                            <button onClick={() => setView('splash')} className="bg-slate-100 p-2 rounded-xl text-slate-400"><Icon name="arrow-left" size={18}/></button>
                            <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Paso {valStep} de 5</span>
                        </div>
                        <h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter leading-none">
                            {valStep === 1 && "DNI: Frente"}
                            {valStep === 2 && "DNI: Dorso"}
                            {valStep === 3 && "Prueba de Vida"}
                            {valStep === 4 && "Ingresos"}
                            {valStep === 5 && "Historial"}
                        </h2>
                    </header>

                    <main className="flex-1 p-8 flex flex-col no-scrollbar overflow-y-auto">
                        {isScanning ? (
                            <div className="flex-1 flex flex-col items-center justify-center animate-pulse">
                                <div className="w-20 h-20 bg-[#EEF3FF] rounded-3xl flex items-center justify-center text-[#0055DD] mb-4">
                                    <Icon name="refresh-cw" size={40} className="animate-spin" />
                                </div>
                                <p className="text-xs font-black text-[#0055DD] uppercase tracking-widest">Validando con IA...</p>
                            </div>
                        ) : (
                            <div className="flex-1 flex flex-col">
                                {valStep === 1 && (
                                    <div className="space-y-8">
                                        <div className="w-full aspect-[3/2] bg-slate-900 rounded-[2rem] relative overflow-hidden border-4 border-[#0055DD]/20 flex flex-col items-center justify-center">
                                            <div className="w-full h-1 bg-[#00D1FF]/40 absolute top-1/2 -translate-y-1/2"></div>
                                            <Icon name="camera" className="text-[#00D1FF] opacity-40" size={48} />
                                            <p className="absolute bottom-4 text-[8px] font-black text-white/40 uppercase tracking-widest">Alineá el frente del DNI</p>
                                        </div>
                                        <div className="bg-blue-50 p-6 rounded-3xl border border-blue-100">
                                            <p className="text-xs text-[#0055DD] font-bold leading-relaxed">Detectaremos tu nombre y DNI automáticamente para iniciar el legajo.</p>
                                        </div>
                                    </div>
                                )}
                                {valStep === 2 && (
                                    <div className="space-y-8">
                                        <div className="w-full aspect-[3/2] bg-slate-900 rounded-[2rem] relative overflow-hidden border-4 border-[#0055DD]/20 flex flex-col items-center justify-center">
                                            <Icon name="camera" className="text-[#00D1FF] opacity-40" size={48} />
                                            <p className="absolute bottom-4 text-[8px] font-black text-white/40 uppercase tracking-widest">Alineá el dorso del DNI</p>
                                        </div>
                                        <p className="text-xs text-slate-500 font-medium text-center">Asegurate que el código de barras sea legible.</p>
                                    </div>
                                )}
                                {valStep === 3 && (
                                    <div className="space-y-8 flex flex-col items-center">
                                        <div className="face-guide flex items-center justify-center bg-slate-100 overflow-hidden shadow-inner">
                                            <Icon name="user" className="text-slate-300" size={80} />
                                        </div>
                                        <div className="text-center space-y-2">
                                            <h4 className="font-black text-[#0D1B4B] uppercase text-sm">Parpadeá tres veces</h4>
                                            <p className="text-xs text-slate-500">Buscamos asegurar que sos una persona real.</p>
                                        </div>
                                    </div>
                                )}
                                {valStep === 4 && (
                                    <div className="space-y-4">
                                        <p className="text-xs text-slate-500 font-bold uppercase tracking-widest mb-4">Últimos 3 recibos de sueldo</p>
                                        {[1, 2, 3].map(i => (
                                            <div key={i} className="p-5 border-2 border-dashed border-slate-200 rounded-2xl flex items-center justify-between group hover:border-[#0055DD] transition-all">
                                                <div className="flex items-center gap-3">
                                                    <Icon name="file-text" className="text-slate-300 group-hover:text-[#0055DD]" />
                                                    <span className="text-[10px] font-black text-slate-400 uppercase">Recibo Mes {i}</span>
                                                </div>
                                                <button className="bg-slate-50 p-2 rounded-lg"><Icon name="plus" size={16} /></button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {valStep === 5 && (
                                    <div className="space-y-6">
                                        <div className="space-y-4">
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">¿Dónde alquilaste antes?</label>
                                                <input type="text" placeholder="Dirección del último hogar" className="w-full bg-slate-50 border-none p-5 rounded-2xl text-sm font-bold" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Referencia (Inmobiliaria/Dueño)</label>
                                                <input type="text" placeholder="Nombre de contacto" className="w-full bg-slate-50 border-none p-5 rounded-2xl text-sm font-bold" />
                                            </div>
                                        </div>
                                        <div className="bg-emerald-50 p-5 rounded-3xl border border-emerald-100 flex gap-4">
                                            <Icon name="award" className="text-emerald-500 shrink-0" />
                                            <p className="text-[10px] text-emerald-700 font-bold leading-tight">Declarar tu historial te permite subir de nivel Standard a Platinum más rápido.</p>
                                        </div>
                                    </div>
                                )}

                                <button onClick={handleNextVal} className="mt-auto w-full bg-[#0055DD] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">
                                    {valStep === 5 ? "Finalizar y Obtener Pasaporte" : "Continuar"}
                                </button>
                            </div>
                        )}
                    </main>
                </div>
            );

            // --- HOME DEL INQUILINO (MODO ESPERA) ---
            const HomeView = () => (
                <div className="mobile-shell bg-[#F0F2F6] flex flex-col animate-in overflow-y-auto no-scrollbar pb-32">
                    <header className="p-8 bg-white border-b flex justify-between items-center sticky top-0 z-20">
                        <Logo />
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full border-2 border-[#0055DD] overflow-hidden bg-slate-100">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Marcos" alt="Avatar" />
                            </div>
                        </div>
                    </header>

                    <main className="p-6 space-y-6">
                        {/* Pasaporte Validado */}
                        <div className="passport-gradient p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                            <Icon name="shield-check" size={150} className="absolute right-[-40px] top-[-40px] opacity-10" />
                            <p className="text-[10px] font-black uppercase text-[#00D1FF] tracking-widest">Poder de Alquiler Validado</p>
                            <h2 className="text-5xl font-black tracking-tighter mt-2">$550.000</h2>
                            <div className="mt-8 flex justify-between items-center border-t border-white/10 pt-6">
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-[#00D1FF] animate-pulse"></div>
                                    <span className="text-[8px] font-black uppercase">Legajo Auditado por IA</span>
                                </div>
                                <Icon name="qr-code" size={32} className="opacity-80" />
                            </div>
                        </div>

                        {/* FUNCIONES BLOQUEADAS HASTA ASOCIAR CONTRATO */}
                        <div className="space-y-4">
                            <div className="flex justify-between items-center px-2">
                                <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Mi Gestión Activa</h4>
                                <div className="flex items-center gap-1 text-slate-400">
                                    <Icon name="lock" size={12} />
                                    <span className="text-[8px] font-black uppercase">Falta Contrato</span>
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4 blur-locked">
                                <div className="bg-white p-6 rounded-[2rem] border shadow-sm">
                                    <Icon name="credit-card" className="mb-2" />
                                    <p className="text-[10px] font-black text-slate-800 uppercase tracking-tighter">Pagar Alquiler</p>
                                </div>
                                <div className="bg-white p-6 rounded-[2rem] border shadow-sm">
                                    <Icon name="wrench" className="mb-2" />
                                    <p className="text-[10px] font-black text-slate-800 uppercase tracking-tighter">Tickets</p>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-[2rem] border shadow-sm blur-locked flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <Icon name="camera" className="text-slate-400" />
                                    <p className="text-[10px] font-black text-slate-800 uppercase tracking-tighter">Bitácora de Estado</p>
                                </div>
                                <Icon name="chevron-right" className="text-slate-200" />
                            </div>
                        </div>

                        {/* Rampa Hipotecaria */}
                        <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm relative overflow-hidden">
                            <Icon name="trending-up" className="absolute right-4 top-4 text-emerald-500" />
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Meta Casa Propia</p>
                            <div className="h-3 bg-slate-50 rounded-full overflow-hidden mb-4 border p-0.5">
                                <div className="h-full bg-gradient-to-r from-[#0055DD] to-emerald-400 rounded-full shadow-[0_0_10px_rgba(0,85,221,0.3)]" style={{ width: '15%' }}></div>
                            </div>
                            <p className="text-[9px] text-slate-500 font-bold italic">Legajo validado. Presentá tu pasaporte para sumar antigüedad.</p>
                        </div>
                    </main>

                    <nav className="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t p-6 pb-10 flex justify-around items-center">
                        <button className="text-[#0055DD] flex flex-col items-center gap-1"><Icon name="home" strokeWidth={3}/><span className="text-[8px] font-black uppercase">Home</span></button>
                        <button className="text-slate-300 flex flex-col items-center gap-1"><Icon name="search" /><span className="text-[8px] font-black uppercase">Buscar</span></button>
                        <button className="text-slate-300 flex flex-col items-center gap-1"><Icon name="wallet" /><span className="text-[8px] font-black uppercase">Wallet</span></button>
                        <button className="text-slate-300 flex flex-col items-center gap-1"><Icon name="user" /><span className="text-[8px] font-black uppercase">Perfil</span></button>
                    </nav>
                </div>
            );

            return (
                <div className="h-screen w-full flex flex-col items-center justify-center p-4">
                    {view === 'splash' && <Splash />}
                    {view === 'validation' && <ValidationWizard />}
                    {(view === 'success' || view === 'home') && <HomeView />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DptoLibreApp />);
    </script>
</body>
</html>
